<div class="container my-5" style="max-width: 600px;">
    <div class="card register-box p-4">

        <h3 class="text-center mb-4" style="color:#d96c9d; font-weight:bold;">
            Registro de Nuevo Usuario
        </h3>

        <form (ngSubmit)="registrar()">
            
            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" name="nombre" [(ngModel)]="nuevoUsuario.nombre" 
                       class="form-control pink-input" placeholder="Ingresa tu nombre" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="correo" [(ngModel)]="nuevoUsuario.correo" 
                       class="form-control pink-input" placeholder="usuario@ejemplo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" [(ngModel)]="nuevoUsuario.password" 
                       class="form-control pink-input" placeholder="••••••••" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="confirmar" [(ngModel)]="confirmarPass" 
                       class="form-control pink-input" placeholder="••••••••" required>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-register">
                    Crear Cuenta
                </button>
            </div>
        </form>

    </div>
</div>
